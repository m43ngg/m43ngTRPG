<!DOCTYPE html>

<html lang="ko">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoC7 NPC 토큰 생성기</title>

<meta name="description" content="Call of Cthulhu 7판 코코포리아용 NPC 토큰과 채팅팔레트를 생성하는 도구입니다.">

<link rel="icon" type="image/svg+xml" href="kanzi_icon.svg">

<!-- Open Graph (SNS 공유용) -->
<meta property="og:title" content="CoC7 NPC 토큰 생성기">
<meta property="og:description" content="크툴루의 부름 7판 NPC 토큰 생성기 - 코코포리아용 채팅팔레트 생성">
<meta property="og:type" content="website">
<meta property="og:url" content="https://m43ngg.github.io/m43ngTRPG/">

<!-- CSS Reset -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-normalize@3.0.1/modern-normalize.min.css">

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">

</head>
	<style>
:root{
  --bg:#f6f3ff;
  --card:#ffffff;
  --text:#262a33;
  --muted:#636b7a;
  --border:#e7e1ff;
  --shadow:0 10px 28px rgba(20, 20, 40, 0.08);
  --radius:16px;
  --primary:#7b61ff;
  --primaryHover:#6b55f0;
  --danger:#e5484d;
  --dangerHover:#d13b40;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Noto Sans KR", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-top:0;
}

header{
  position:sticky;
  top:0;
  z-index:1000;
  background:linear-gradient(90deg,#b8a6ff,#d7ccff);
  color:#fff;
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}
header h1{
  max-width:960px;
  margin:0 auto;
  padding:14px 18px;
  font-size:22px;
  font-weight:900;
  letter-spacing:-0.4px;
}

.container{
  max-width:960px;
  margin:18px auto 32px;
  padding:0 16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* Cards */
.section{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px 18px;
}

h3{
  margin:0 0 10px 0;
  font-size:16px;
  font-weight:900;
  letter-spacing:-0.2px;
}

label{
  font-weight:800;
  color:var(--muted);
  font-size:13px;
}

input, select, textarea{
  border:1px solid var(--border);
  border-radius:12px;
  padding:8px 10px;
  font-size:14px;
  background:#fff;
  color:var(--text);
  outline:none;
}
input:focus, select:focus, textarea:focus{
  border-color:rgba(123,97,255,.55);
  box-shadow:0 0 0 4px rgba(123,97,255,.12);
}

textarea{
  width:100%;
  min-height:120px;
  resize:vertical;
  line-height:1.5;
}

/* Buttons */
button{
  border:0;
  border-radius:12px;
  padding:9px 12px;
  font-weight:900;
  letter-spacing:-0.2px;
  cursor:pointer;
  background:var(--primary);
  color:#fff;
  transition:background .15s ease, transform .03s ease;
  white-space:nowrap;
}
button:hover{ background:var(--primaryHover); }
button:active{ transform:translateY(1px); }

.btnDanger{ background:var(--danger); }
.btnDanger:hover{ background:var(--dangerHover); }

/* Tables */
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  overflow:hidden;
  border-radius:14px;
  border:1px solid var(--border);
}
th, td{
  border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);
  padding:8px 8px;
  text-align:center;
  font-size:13px;
}
tr:last-child td{ border-bottom:0; }
th:last-child, td:last-child{ border-right:0; }
th{
  background:#f4f1ff;
  font-weight:900;
}
td input{
  width:100%;
  border:0;
  padding:6px 4px;
  background:transparent;
  border-radius:10px;
}
td input:focus{
  outline:none;
  box-shadow:0 0 0 4px rgba(123,97,255,.10);
}

/* Top save/load row */
.section > div:first-child{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}
.section select#loadKey{
  min-width:240px;
}

/* Output buttons: force ONE row on desktop, wrap on small */
.section button#rollBtn,
.section button#copyBtn,
.section button#rollCopyBtn,
.section button#cpCopyBtn,
.section button#rollCpCopyBtn{
  flex:1 1 auto;
}

.section .settings{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.section .settings:first-of-type{
  margin-top:0;
}

/* Make the first button row (roll/copy/rollcopy) a single row */
.section .settings:not(:last-of-type){
  display:flex;
  flex-wrap:nowrap;
}

/* Second row (chatpal) also single row */
.section .settings:last-of-type{
  flex-wrap:nowrap;
}

/* Status message */
#message, #saveMessage{
  margin-left:8px;
  font-weight:900;
  color:var(--muted);
}

/* Add row buttons */
#addSkillBtn, #addDamageBtn{
  width:42px;
  height:42px;
  padding:0;
  border-radius:14px;
  font-size:20px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

/* Delete row button (X) */
.del-btn{
  width:36px;
  height:36px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  cursor:pointer;
}
.del-btn:hover{ background:#faf9ff; }

.command-table{
  display:block;
}
.command-table table{
  max-width:none !important;
  width:100%;
}

/* Responsive: allow wrapping buttons instead of exploding layout */
@media (max-width: 860px){
  .section .settings{ flex-wrap:wrap; }
  .section select#loadKey{ min-width: 180px; }
}

/* --- spacing fixes --- */
label{ display:inline-flex; align-items:center; gap:8px; }
label input[type="text"], label input[type="number"]{ margin-left:0 !important; }
#derivedStats, .derivedStats, .kvRow{ display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
/* fallback: make any section row with many small labels breathe */
.section .row{ gap:12px; }

/* plus button alignment */
.addBtn, #addSkillBtn, #addDamageBtn{
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  vertical-align:middle;
}
/* keep + buttons aligned to left under table */
.tableActions{
  margin-top:10px;
}


/* spacing fixes for add buttons and sections */
.tableActions{
    margin-top:14px;
    margin-bottom:10px;
}

#addSkillBtn, #addDamageBtn, .addBtn{
    margin-top:10px;
}

.section{
    margin-bottom:18px;
}

.sectionTitle{
    margin-bottom:14px;
}


/* --- layout spacing polish --- */
.skill-table{ margin-bottom: 14px; }
.command-table{ margin-top: 14px; }
.skill-table h3, .command-table h3, .section h3{ margin: 0 0 10px 0; }

/* keep delete buttons centered inside cells */
table td:last-child{ vertical-align: middle; }
.del-btn{ margin: 0 auto; display: block; }


/* --- table row label alignment (주사위/값) --- */
table td:first-child, table th:first-child{
  text-align:center !important;
  vertical-align:middle !important;
  font-weight:800;
  width:72px;
}
/* ability value inputs centered */
#abilitiesTable td input{
  text-align:center;
}
/* --- derived stats inputs: prevent 2-digit clipping --- */
#hp, #mp, #san, #db, #build, #mov{
  width:72px !important;
  min-width:72px !important;
  text-align:center;
  padding:8px 10px !important;
  line-height:1.2;
}
/* checkbox label spacing for 이성 */
label[for="sanToggle"], #sanToggle{
  margin-right:6px;
}



/* --- merged skill/command section --- */
.skill-command-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:16px;
  align-items:start;
}
.skill-command-grid .sc-col h3{
  margin:0 0 10px 0;
}
@media (max-width: 860px){
  .skill-command-grid{ grid-template-columns: 1fr; }
}
/* keep delete column compact */
#skillsTable th:last-child, #skillsTable td:last-child,
#damageTable th:last-child, #damageTable td:last-child{
  width:64px;
}
/* ensure + button sits under its table */
.tableActions{ margin-top:10px; }

/* --- skill/command grid fix --- */
.skill-command-grid{
  display:grid;
  grid-template-columns: 1fr 1.2fr;
  gap:18px;
  align-items:start;
}
.skill-command-grid .sc-col{ min-width:0; }
@media (max-width: 900px){
  .skill-command-grid{ grid-template-columns: 1fr; }
}

/* --- damage table column widths --- */
#damageTable{ table-layout: fixed; }
#damageTable th:nth-child(1), #damageTable td:nth-child(1){ width: 140px; }
#damageTable th:nth-child(3), #damageTable td:nth-child(3){ width: 52px; }
#damageTable td:nth-child(1) input{ width: 100%; }
#damageTable td:nth-child(2) input{ width: 100%; }


/* --- v17 polish: alignment + clipping fixes --- */

/* remove awkward empty title spacing if any */
.sectionTitle:empty{ display:none !important; margin:0 !important; padding:0 !important; }

/* tables: make last column consistent and ensure contents aren't clipped */
table{ overflow: visible !important; }
th, td{ position: relative; }
td:last-child, th:last-child{ width: 64px; min-width:64px; padding-right:14px !important; padding-left:14px !important; }

/* delete button perfectly centered */
.del-btn{
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  margin:0 auto !important;
  width:40px !important;
  height:40px !important;
  border-radius:12px !important;
}
.del-btn svg, .del-btn span{ pointer-events:none; }

/* skill/command grid: better ratio */
.skill-command-grid{
  grid-template-columns: 1fr 1fr !important;
}

/* damage table: name column less wide */
#damageTable{ table-layout: fixed; }
#damageTable th:nth-child(1), #damageTable td:nth-child(1){ width: 110px !important; }
#damageTable th:nth-child(3), #damageTable td:nth-child(3){ width: 64px !important; }

/* plus buttons aligned and with spacing */
.tableActions{ margin-top:12px !important; }
#addSkillBtn, #addDamageBtn{ margin-top:0 !important; }



/* --- v18: command name wider, skill delete narrower, plus button right aligned --- */

/* damage table: make name column wider per request */
#damageTable th:nth-child(1), #damageTable td:nth-child(1){ width: 180px !important; }
#damageTable th:nth-child(3), #damageTable td:nth-child(3){ width: 56px !important; }

/* skills table: make delete column narrower */
#skillsTable th:last-child, #skillsTable td:last-child{ width: 56px !important; min-width:56px !important; padding-left:10px !important; padding-right:10px !important; }

/* plus buttons: place to the right and add breathing room */
.tableActions{
  margin-top:14px !important;
  display:flex !important;
  justify-content:flex-end !important;
}
#addSkillBtn, #addDamageBtn{
  margin:0 !important;
}


/* --- v19: + 버튼을 테이블 아래 '오른쪽'으로 확실히 배치 --- */
.tableActions{
  width: 100% !important;
  display: flex !important;
  justify-content: flex-end !important;
  margin-top: 16px !important;
}
.tableActions .addBtn{
  width: 44px !important;
  height: 44px !important;
  border-radius: 14px !important;
  font-size: 20px !important;
}

		.skill-table, .command-table{ padding-bottom: 6px; }

#skillsTable th:last-child, #skillsTable td:last-child{ width: 56px !important; min-width:56px !important; }

#skillsTable th:last-child, #skillsTable td:last-child,
#damageTable th:last-child, #damageTable td:last-child{
  padding-left: 12px !important;
  padding-right: 12px !important;
  width: 72px !important;
  min-width: 72px !important;
}

.del-btn{
  width: 44px !important;
  height: 44px !important;
  border-radius: 14px !important;
}

/* skills: 기능치80 / 값20 (exclude X col) */
#skillsTable{ table-layout: fixed; }
#skillsTable th:nth-child(1), #skillsTable td:nth-child(1){ width: 80% !important; }
#skillsTable th:nth-child(2), #skillsTable td:nth-child(2){ width: 20% !important; }

/* damage: 이름50 / 커맨드50 (exclude X col) */
#damageTable{ table-layout: fixed; }
#damageTable th:nth-child(1), #damageTable td:nth-child(1){ width: 50% !important; }
#damageTable th:nth-child(2), #damageTable td:nth-child(2){ width: 50% !important; }

/* make inputs fill cells cleanly */
#skillsTable td:nth-child(1) input, #skillsTable td:nth-child(2) input,
#damageTable td:nth-child(1) input, #damageTable td:nth-child(2) input{
  width: 100% !important;
}


/* --- ability table: prevent EDU shrinking --- */
#abilityTable{ table-layout:fixed; width:100%; }
#abilityTable th{ white-space:nowrap; }


#abilityTable{
  display: table !important;   /* restore real table layout */
  table-layout: fixed !important;
  width: 100% !important;
}
#abilityTable th, #abilityTable td{ white-space: nowrap; }


#abilityTable, #abilitiesTable{
  table-layout: fixed !important;
  width: 100% !important;
}
#abilityTable th, #abilityTable td,
#abilitiesTable th, #abilitiesTable td{
  white-space: nowrap;
  text-align: center;
}
/* first column fixed */
#abilityTable th:nth-child(1), #abilityTable td:nth-child(1),
#abilitiesTable th:nth-child(1), #abilitiesTable td:nth-child(1){
  width: 70px !important;
}
/* remaining 8 columns equal */
#abilityTable th:nth-child(n+2), #abilityTable td:nth-child(n+2),
#abilitiesTable th:nth-child(n+2), #abilitiesTable td:nth-child(n+2){
  width: calc((100% - 70px) / 8) !important;
}

</style>
</head>
<body>
<header><h1>CoC7 NPC 토큰 생성기</h1></header>
<div class="container">
<div class="section">
<div class="settings">
<button onclick="saveData()">저장</button>
<select id="loadKey">
<option value="">-- 저장된 데이터 선택 --</option>
</select>
<button onclick="loadData()">불러오기</button>
<button class="btnDanger" onclick="deleteData()">삭제</button>
<span id="saveMessage"></span>
</div>
</div>
<div class="section">
<div class="settings">
<label>이름 <input id="nameInput" type="text"/></label>
</div>
<div class="settings">
<table id="abilityTable" style="width:100%; table-layout:fixed;">
<colgroup>
  <col style="width:70px;">
  <col style="width:calc((100% - 70px)/8);">
  <col style="width:calc((100% - 70px)/8);">
  <col style="width:calc((100% - 70px)/8);">
  <col style="width:calc((100% - 70px)/8);">
  <col style="width:calc((100% - 70px)/8);">
  <col style="width:calc((100% - 70px)/8);">
  <col style="width:calc((100% - 70px)/8);">
  <col style="width:calc((100% - 70px)/8);">
</colgroup>
<tr>
<th style="width: 70px">능력치</th>
<th>근력</th>
<th>건강</th>
<th>정신력</th>
<th>민첩</th>
<th>외모</th>
<th>크기</th>
<th>지능</th>
<th>교육</th>
</tr>
<tr id="diceRow">
<td>주사위</td>
<td><input id="dice-STR" type="text"/></td>
<td><input id="dice-CON" type="text"/></td>
<td><input id="dice-POW" type="text"/></td>
<td><input id="dice-DEX" type="text"/></td>
<td><input id="dice-APP" type="text"/></td>
<td><input id="dice-SIZ" type="text"/></td>
<td><input id="dice-INT" type="text"/></td>
<td><input id="dice-EDU" type="text"/></td>
</tr>
<tr id="valueRow">
<td>값</td>
<td><input class="val" id="val-STR" type="number"/></td>
<td><input class="val" id="val-CON" type="number"/></td>
<td><input class="val" id="val-POW" type="number"/></td>
<td><input class="val" id="val-DEX" type="number"/></td>
<td><input class="val" id="val-APP" type="number"/></td>
<td><input class="val" id="val-SIZ" type="number"/></td>
<td><input class="val" id="val-INT" type="number"/></td>
<td><input class="val" id="val-EDU" type="number"/></td>
</tr>
</table>
</div>
<div class="settings">
<label>이성<input id="sanToggle" style="width: 20px; height: 20px; vertical-align: middle" type="checkbox" value="no"/></label>
<label>HP<input id="hp" style="width: 50px" type="number"/></label>
<label>MP<input id="mp" style="width: 50px" type="number"/></label>
<label id="sanLabel" style="display: none">이성(SAN) <input id="san" style="width: 50px" type="number"/></label>
<label>DB<input id="db" style="width: 70px" type="text"/></label>
<label>체구<input id="build" style="width: 50px" type="number"/></label>
<label>이동력(MOV)<input id="mov" style="width: 50px" type="number"/></label>
</div>
</div>
<div class="section">
<div class="settings">
<button id="rollBtn">굴림</button>
<button id="copyBtn">복사</button>
<button id="rollCopyBtn">굴림+복사</button>
<span id="message"></span>
</div>
<div class="settings">
<button id="cpCopyBtn">채팅팔레트 복사</button>
<button id="rollCpCopyBtn">굴림+채팅팔레트 복사</button>
</div>
</div>
<div class="section"><div class="sectionTitle"></div><div class="skill-command-grid"><div class="sc-col"><div class="command-table">
<h3>기능치</h3>
<table id="skillsTable" style="max-width: 340px">
<tr>
<th>기능치</th>
<th style="width: 60px">값</th>
<th style="width: 30px"></th>
</tr>
</table>
<div class="tableActions"><button id="addSkillBtn" class="addBtn">＋</button></div>
</div></div><div class="sc-col"><div class="command-table">
<h3>기타 커맨드(데미지 등)</h3>
<table id="damageTable" style="max-width: 530px">
<tr>
<th>이름</th>
<th>커맨드</th>
<th style="width: 30px"></th>
</tr>
</table>
<div class="tableActions"><button id="addDamageBtn" class="addBtn">＋</button></div>
</div></div><div class="sc-col"></div></div></div>
<div class="section">
<h3>메모</h3>
<textarea id="memoInput" placeholder="여기에 메모를 입력하세요" style="width: 100%; height: 120px"></textarea>
</div>
</div>
<script>
			const MIN_ROWS = 1;
			const messageEl = document.getElementById("message");
			const saveMessageEl = document.getElementById("saveMessage");
			const sanToggleEL = document.getElementById("sanToggle");
			const loadKeySelect = document.getElementById("loadKey");

			function showMessage(msg) {
				messageEl.textContent = msg;
				setTimeout(() => (messageEl.textContent = ""), 2000);
			}

			function showSaveMessage(msg) {
				saveMessageEl.textContent = msg;
				setTimeout(() => (saveMessageEl.textContent = ""), 2000);
			}

			function updateDataList() {
				loadKeySelect.innerHTML = '<option value="">-- 저장된 데이터 선택 --</option>';
				for (let i = 0; i < localStorage.length; i++) {
					const key = localStorage.key(i);
					if (key.startsWith("coc7_savedData_")) {
						const option = document.createElement("option");
						option.value = key;
						option.textContent = key.substring("coc7_savedData_".length);
						loadKeySelect.appendChild(option);
					}
				}
			}

			function saveData() {
				const saveName = document.getElementById("nameInput").value.trim();
				if (!saveName) {
					showSaveMessage("이름을 입력해주세요.");
					return;
				}

				const dataToSave = {};

				dataToSave.nameInput = saveName;

				const abilities = {};
				["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU"].forEach((l) => {
					const diceInput = document.getElementById("dice-" + l);
					const valInput = document.getElementById("val-" + l);
					abilities[l] = {
						dice: diceInput ? diceInput.value : "",
						value: valInput ? valInput.value : "",
					};
				});
				dataToSave.abilities = abilities;

				const skills = [];
				const skillsTable = document.getElementById("skillsTable");
				for (let i = 1; i < skillsTable.rows.length; i++) {
					const row = skillsTable.rows[i];
					const skillNameInput = row.cells[0].querySelector('input[type="text"]');
					const skillValueInput = row.cells[1].querySelector('input[type="number"]');
					if (skillNameInput && skillValueInput && skillNameInput.value.trim() !== "" && skillValueInput.value.trim() !== "") {
						skills.push({
							name: skillNameInput.value.trim(),
							value: skillValueInput.value,
						});
					}
				}
				dataToSave.skills = skills;

				const commands = [];
				const damageTable = document.getElementById("damageTable");
				for (let i = 1; i < damageTable.rows.length; i++) {
					const row = damageTable.rows[i];
					const commandNameInput = row.cells[0].querySelector('input[type="text"]');
					const commandValueInput = row.cells[1].querySelector('input[type="text"]');
					if (commandNameInput && commandValueInput && commandNameInput.value.trim() !== "" && commandValueInput.value.trim() !== "") {
						commands.push({
							name: commandNameInput.value.trim(),
							command: commandValueInput.value.trim(),
						});
					}
				}
				dataToSave.commands = commands;

				dataToSave.mov = document.getElementById("mov").value;

				dataToSave.memoInput = document.getElementById("memoInput").value;

				const key = `coc7_savedData_${saveName}`;
				localStorage.setItem(key, JSON.stringify(dataToSave));
				showSaveMessage("저장이 완료됐습니다.");
				document.getElementById("nameInput").value = "";
				updateDataList();
			}

			function loadData() {
				const selectedKey = loadKeySelect.value;
				if (!selectedKey) {
					showSaveMessage("불러올 데이터를 선택해 주세요");
					return;
				}

				const savedDataJSON = localStorage.getItem(selectedKey);
				if (savedDataJSON) {
					const savedData = JSON.parse(savedDataJSON);

					document.getElementById("nameInput").value = savedData.nameInput || "";

					if (savedData.abilities) {
						["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU"].forEach((l) => {
							const diceInput = document.getElementById("dice-" + l);
							const valInput = document.getElementById("val-" + l);
							if (diceInput && savedData.abilities[l] && savedData.abilities[l].hasOwnProperty("dice")) {
								diceInput.value = savedData.abilities[l].dice;
							} else if (diceInput) {
								diceInput.value = "";
							}
							if (valInput && savedData.abilities[l] && savedData.abilities[l].hasOwnProperty("value")) {
								valInput.value = savedData.abilities[l].value;
							} else if (valInput) {
								valInput.value = "";
							}
						});
					}

					const skillsTable = document.getElementById("skillsTable");
					while (skillsTable.rows.length > 1) {
						skillsTable.deleteRow(1);
					}

					if (savedData.skills && savedData.skills.length > 0) {
						savedData.skills.forEach((skill) => {
							addRow("skillsTable");
							const newRow = skillsTable.rows[skillsTable.rows.length - 1];
							newRow.cells[0].querySelector('input[type="text"]').value = skill.name;
							newRow.cells[1].querySelector('input[type="number"]').value = skill.value;
						});
					}

					while (skillsTable.rows.length <= MIN_ROWS) {
						addRow("skillsTable");
					}

					const damageTable = document.getElementById("damageTable");
					while (damageTable.rows.length > 1) {
						damageTable.deleteRow(1);
					}

					if (savedData.commands && savedData.commands.length > 0) {
						savedData.commands.forEach((command) => {
							addRow("damageTable");
							const newRow = damageTable.rows[damageTable.rows.length - 1];
							newRow.cells[0].querySelector('input[type="text"]').value = command.name;
							newRow.cells[1].querySelector('input[type="text"]').value = command.command;
						});
					}

					while (damageTable.rows.length <= MIN_ROWS) {
						addRow("damageTable");
					}

					const movInput = document.getElementById("mov");
					if (savedData.hasOwnProperty("mov")) {
						movInput.value = savedData.mov;
					} else {
						movInput.value = "";
					}

					const memoInput = document.getElementById("memoInput");
					if (savedData.hasOwnProperty("memoInput")) {
						memoInput.value = savedData.memoInput;
					} else {
						memoInput.value = "";
					}

					updateStats();
					showSaveMessage("불러오기 성공");
				} else {
					showSaveMessage("데이터를 찾을 수 없습니다.");
				}
			}

			function deleteData() {
				const selectedKey = loadKeySelect.value;
				if (!selectedKey) {
					showSaveMessage("삭제할 데이터를 선택해 주세요.");
					return;
				}

				if (confirm(`「${selectedKey.substring("coc7_savedData_".length)}」のデータを삭제してもよろしいですか？`)) {
					localStorage.removeItem(selectedKey);
					showSaveMessage("데이터 삭제 완료");
					updateDataList();
				}
			}

			function rollDice(expr) {
				expr = expr.replace(/\s+/g, "");
				if (!/[dD]/.test(expr)) {
					const result = eval(expr);
					if (!Number.isFinite(result)) throw new Error("Invalid constant expression");
					return result;
				}
				const m = expr.match(/(\d+)d(\d+)(\+\d+)?/i);
				if (!m) return 0;
				let n = +m[1],
					sides = +m[2],
					bonus = m[3] ? +m[3].slice(1) : 0;
				let sum = 0;
				for (let i = 0; i < n; i++) sum += Math.floor(Math.random() * sides) + 1;
				return sum + bonus;
			}

			function getDBBuild(total) {
				const tiers = [
					{ r: 64, db: "-2", b: -2 },
					{ r: 84, db: "-1", b: -1 },
					{ r: 124, db: "0", b: 0 },
					{ r: 164, db: "+1D4", b: 1 },
					{ r: 204, db: "+1D6", b: 2 },
					{ r: 284, db: "+2D6", b: 3 },
					{ r: 364, db: "+3D6", b: 4 },
					{ r: 444, db: "+4D6", b: 5 },
					{ r: 524, db: "+5D6", b: 6 },
				];
				for (let t of tiers) if (total <= t.r) return { db: t.db, build: t.b };
				let extra = Math.floor((total - 525) / 80) + 1;
				let base = tiers[tiers.length - 1];
				return { db: `+${5 + extra}D6`, build: base.b + extra };
			}

			function updateStats() {
				const getVal = (id) => +document.getElementById(id).value || 0;
				const con = getVal("val-CON"),
					siz = getVal("val-SIZ"),
					pow = getVal("val-POW");
				document.getElementById("hp").value = Math.floor((con + siz) / 10);
				document.getElementById("mp").value = Math.floor(pow / 5);
				document.getElementById("san").value = pow;
				const total = getVal("val-STR") + siz;
				const { db, build } = getDBBuild(total);
				document.getElementById("db").value = db;
				document.getElementById("build").value = build;
			}

			function rollAbilities() {
				["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU"].forEach((label) => {
					const d = document.getElementById("dice-" + label).value.trim();
					if (d) document.getElementById("val-" + label).value = rollDice(d) * 5;
				});
				updateStats();
			}

			function addRow(tableId) {
				const tbl = document.getElementById(tableId);
				const row = tbl.insertRow(-1);
				if (tableId == "skillsTable") {
					row.innerHTML = '<td><input type="text"></td><td><input type="number"></td><td><button class="del-btn">❌️</button></td>';
				} else {
					row.innerHTML = '<td><input type="text"></td><td><input type="text"></td><td><button class="del-btn">❌️</button></td>';
				}
			}

			function setupTables() {
				for (let i = 0; i < MIN_ROWS; i++) addRow("skillsTable");
				for (let i = 0; i < MIN_ROWS; i++) addRow("damageTable");
			}

			document.addEventListener("DOMContentLoaded", () => {
				setupTables();
				sanToggleEL.addEventListener("change", function () {
					document.getElementById("sanLabel").style.display = this.checked ? "inline" : "none";
				});
				document.getElementById("rollBtn").addEventListener("click", rollAbilities);
				document.getElementById("copyBtn").addEventListener("click", () => {
					navigator.clipboard.writeText(generateJSON());
					showMessage("복사 완료");
				});
				document.getElementById("rollCopyBtn").addEventListener("click", () => {
					rollAbilities();
					navigator.clipboard.writeText(generateJSON());
					showMessage("복사 완료");
				});
				document.getElementById("cpCopyBtn").addEventListener("click", () => {
					navigator.clipboard.writeText(generateChaPale().cmds);
					showMessage("복사 완료");
				});
				document.getElementById("rollCpCopyBtn").addEventListener("click", () => {
					rollAbilities();
					navigator.clipboard.writeText(generateChaPale().cmds);
					showMessage("복사 완료");
				});
				document.getElementById("addSkillBtn").addEventListener("click", () => addRow("skillsTable"));
				document.getElementById("addDamageBtn").addEventListener("click", () => addRow("damageTable"));
				document.body.addEventListener("click", (e) => {
					if (e.target.classList.contains("del-btn")) {
						const tbl = e.target.closest("table");
						if (tbl.rows.length > MIN_ROWS + 1) {
							e.target.closest("tr").remove();
						}
					}
				});
				document.querySelectorAll(".val").forEach((inp) => inp.addEventListener("change", updateStats));
			});

			function generateChaPale() {
				const params = [];
				const cmds = [];

				const LABEL = {
					STR: "근력",
					CON: "건강",
					POW: "정신력",
					DEX: "민첩",
					APP: "외모",
					SIZ: "크기",
					INT: "지능",
					EDU: "교육",
					SAN: "이성",
				};

				if (sanToggleEL.checked) cmds.push("CC<={SAN} 이성굴림");

				["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU"].forEach((l) => {
					const v = document.getElementById("val-" + l).value;
					if (v) {
						params.push({ label: LABEL[l] ?? l, value: v });
						cmds.push(`CC<={${LABEL[l] ?? l}} ${LABEL[l] ?? l}`);
					}
				});

				params.push({ label: "DB", value: document.getElementById("db").value });
				params.push({ label: "체구", value: document.getElementById("build").value });
				const m = document.getElementById("mov").value;
				if (m) params.push({ label: "MOV", value: m });

				document.querySelectorAll("#skillsTable tr").forEach((tr, i) => {
					if (i === 0) return;
					const n = tr.cells[0].querySelector("input").value;
					const v = tr.cells[1].querySelector("input").value;
					if (n && v) cmds.push(`CC<=${v} ${n}`);
				});

				document.querySelectorAll("#damageTable tr").forEach((tr, i) => {
					if (i === 0) return;
					const n = tr.cells[0].querySelector("input").value;
					let v = tr.cells[1].querySelector("input").value;
					if (n && v) {
						v = v.replace(/DB/g, "{DB}");
						cmds.push(`${v} ${n}`);
					}
				});

				params.forEach((p) => cmds.push(`//${p.label}=${p.value}`));

				return { params: params, cmds: cmds.join("\n") };
			}

			function generateJSON() {
				const name = document.getElementById("nameInput").value;
				const hp = +document.getElementById("hp").value || 0;
				const mp = +document.getElementById("mp").value || 0;
				const san = +document.getElementById("san").value || 0;
				const memo = document.getElementById("memoInput").value;
				const chaPale = generateChaPale();
				const params = chaPale.params;
				const status = [{ label: "HP", value: hp, max: hp }, { label: "MP", value: mp, max: mp }, ...(sanToggleEL?.checked ? [{ label: "SAN", value: san, max: san }] : [])];

				const obj = {
					kind: "character",
					data: {
						name,
						initiative: +document.getElementById("val-DEX").value || 0,
						externalUrl: "",
						status,
						params,
						commands: chaPale.cmds,
						memo,
					},
				};
				return JSON.stringify(obj);
			}

			updateDataList();
		</script>
